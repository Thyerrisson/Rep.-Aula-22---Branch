<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Dashboard - Ciência de Dados</title>
    <style>
        /* CSS BASE - ESTE É O BLOCO QUE ELES VÃO ALTERAR NA BRANCH */
        body {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            background-color: #ffffff; /* Cor para alterar no modo noturno */
            color: #ffffff;               /* Cor para alterar no modo noturno */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .dashboard-container {
            background-color: #6776ba; /* Cor para alterar no modo noturno */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #000000;
            margin-bottom: 20px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: #ffffff;
            padding: 15px;
            border-radius: 8px;
        }

        .card-value {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .card-label {
            font-size: 14px;
            color: #000000;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1>APP BÍBLICO</h1>
        
        <div class="metrics-grid">
            <div class="card">
                <span class="card-value">João 14:1 - "Não se turbe o vosso coração"</span>
                <span class="card-label">Versículo do dia:</span>
            </div>
            <div class="card">
                <span class="card-value">Salmos 61</span>
                <span class="card-label">Recomendação:</span>
            </div>
        </div>

        <p style="margin-top: 25px; font-size: 12px; color: #000000;">
            Deus é bom? <span style="color: rgb(255, 0, 0);">● Claro que sim</span>
        </p>
    </div>

</body>
</html>
