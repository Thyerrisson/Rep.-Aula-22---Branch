<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Dashboard - Ciência de Dados</title>
    <style>
        /* CSS BASE - ESTE É O BLOCO QUE ELES VÃO ALTERAR NA BRANCH */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1fa04c; /* Cor para alterar no modo noturno */
            color: #333;               /* Cor para alterar no modo noturno */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .dashboard-container {
            background-color: #1fa04c; /* Cor para alterar no modo noturno */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #fdfdfd;
            margin-bottom: 20px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: #1b8341;
            padding: 15px;
            border-radius: 8px;
        }

        .card-value {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .card-label {
            font-size: 14px;
            color: #f0f0f0;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1>Chance de Risco</h1>
        
        <div class="metrics-grid">
            <div class="card">
                <span class="card-value">60%</span>
                <span class="card-label">Nível de perigo</span>
            </div>
            <div class="card">
                <span class="card-value">67%</span>
                <span class="card-label">Probabilidade de sucesso</span>
            </div>
        </div>

        <p style="margin-top: 25px; font-size: 12px; color: #fd0000;">
            Instabilidade do mercado: <span style="color: rgb(255, 0, 0);">● ALTA!!</span>
        </p>
    </div>

</body>
</html>
