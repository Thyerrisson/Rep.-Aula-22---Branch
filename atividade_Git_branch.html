<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Dashboard - Ciência de Dados</title>
    <style>
        /* CSS BASE - ESTE É O BLOCO QUE ELES VÃO ALTERAR NA BRANCH */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1816ad; /* Cor para alterar no modo noturno */
            color: #1218dd;               /* Cor para alterar no modo noturno */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .dashboard-container {
            background-color: rgb(70, 116, 151); /* Cor para alterar no modo noturno */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #000000;
            margin-bottom: 20px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: #ffffff;
            padding: 15px;
            border-radius: 8px;
        }

        .card-value {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .card-label {
            font-size: 14px;
            color: #fefefe;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1>TESTE DE DNA RATINHO</h1>
        
        <div class="metrics-grid">
            <div class="card">
                <span class="card-value">NÃO</span>
                <span class="card-label">João é o pai?</span>
            </div>
            <div class="card">
                <span class="card-value">NÃO</span>
                <span class="card-label">Marcos é o pai?</span>
            </div>
        </div>

        <p style="margin-top: 25px; font-size: 12px; color: #000000;">
            Nível de infidelidade de Maria (a mãe): <span style="color: rgb(255, 0, 0);">● ALTO!!</span>
        </p>
    </div>

</body>
</html>
